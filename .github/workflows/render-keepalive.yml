name: Render Keep Alive

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  ping-healthcheck:
    runs-on: ubuntu-latest
    env:
      HEALTHCHECK_URL: "https://notify-me-b3fu.onrender.com/"
    steps:
      - name: Ping Render health endpoint
        run: |
          echo "Pinging $HEALTHCHECK_URL"
          curl --fail --show-error --silent \
            --max-time 15 \
            --retry 3 \
            --retry-all-errors \
            "$HEALTHCHECK_URL"

          echo "Healthcheck ping sent successfully"
